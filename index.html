<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#f0b429">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Gold Trader Pro</title>
<style>
  /* Full-page auth check screen */
  body { margin:0; background:#06060e; display:flex; align-items:center; justify-content:center; height:100vh; font-family:'JetBrains Mono',monospace; }
  .loader { text-align:center; }
  .au { width:48px;height:48px;border-radius:10px;background:#f0b429;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#000;margin:0 auto 14px;animation:pulse 1.5s infinite;font-family:'Barlow Condensed',sans-serif; }
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(240,180,41,0.4)}50%{box-shadow:0 0 0 12px rgba(240,180,41,0)}}
  .msg { color:#4a4870; font-size:12px; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="loader">
  <div class="au">Au</div>
  <div class="msg" id="msg">Verifying session...</div>
</div>

<script>
// ══════════════════════════════════════════════════════
//   AUTH GUARD — index.html
//   This is the entry point. It checks auth then loads
//   either login.html or app.html.
//   Rename your current index.html to app.html
// ══════════════════════════════════════════════════════

const SUPABASE_URL  = localStorage.getItem('gtp_sb_url')  || '';
const SUPABASE_ANON = localStorage.getItem('gtp_sb_anon') || '';

async function checkAuth() {
  // If Supabase not configured, go straight to app (dev mode)
  if(!SUPABASE_URL || SUPABASE_URL === 'YOUR_SUPABASE_URL') {
    document.getElementById('msg').textContent = 'Loading terminal...';
    setTimeout(() => window.location.href = 'app.html', 300);
    return;
  }

  try {
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

    // Handle auth callback (Google OAuth redirect, magic link, etc.)
    const hash = window.location.hash;
    if(hash.includes('access_token') || hash.includes('type=recovery') || hash.includes('type=signup')) {
      document.getElementById('msg').textContent = 'Completing sign in...';
      // Let Supabase process the hash
      await new Promise(r => setTimeout(r, 500));
    }

    const { data: { session }, error } = await sb.auth.getSession();

    if(session?.user) {
      // Valid session — store user info and load app
      const u = session.user;
      localStorage.setItem('gtp_user_email',  u.email || '');
      localStorage.setItem('gtp_user_name',   u.user_metadata?.full_name || u.user_metadata?.name || u.email?.split('@')[0] || 'Trader');
      localStorage.setItem('gtp_user_id',     u.id);
      localStorage.setItem('gtp_user_avatar', u.user_metadata?.avatar_url || '');
      localStorage.setItem('gtp_sb_session',  JSON.stringify(session));
      document.getElementById('msg').textContent = 'Welcome back!';
      setTimeout(() => window.location.href = 'app.html', 300);
    } else {
      // No session — go to login
      document.getElementById('msg').textContent = 'Please sign in...';
      setTimeout(() => window.location.href = 'login.html', 300);
    }
  } catch(e) {
    console.error('Auth check failed:', e);
    // On error, go to login
    window.location.href = 'login.html';
  }
}

checkAuth();
</script>
</body>
</html>
